# CI Pipeline — Wird von init-project.sh kopiert und vom DevOps-Skill (Phase 2.5) erweitert.
# Basis: lint, typecheck, test, build. Deployment-Config kommt in Phase 5.
# Template-safe: Überspringt graceful wenn kein package.json vorhanden ist.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Gate: Prüfe ob ein Node.js-Projekt vorhanden ist
  check-project:
    name: Check Project Setup
    runs-on: ubuntu-latest
    outputs:
      has-node: ${{ steps.check.outputs.has-node }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f "package.json" ]; then
            echo "has-node=true" >> "$GITHUB_OUTPUT"
            echo "✅ package.json found — running quality checks"
          else
            echo "has-node=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ No package.json — skipping CI (template mode)"
          fi

  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    needs: check-project
    if: needs.check-project.outputs.has-node == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Test
        run: npm run test --if-present

      - name: Build
        run: npm run build --if-present

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev || true
        # Warnt bei high/critical vulnerabilities, blockiert aber nicht (|| true)
        # Wird in Phase 5 auf "blocking" umgestellt

  # Ergebnis-Job: Zeigt Status auch wenn quality übersprungen wurde
  ci-result:
    name: CI Result
    runs-on: ubuntu-latest
    if: always()
    needs: [check-project, quality]
    steps:
      - run: |
          if [ "${{ needs.check-project.outputs.has-node }}" != "true" ]; then
            echo "⏭️ Template mode — no Node.js project yet. CI skipped successfully."
            exit 0
          fi
          if [ "${{ needs.quality.result }}" == "success" ]; then
            echo "✅ All quality checks passed."
            exit 0
          fi
          echo "❌ Quality checks failed."
          exit 1
